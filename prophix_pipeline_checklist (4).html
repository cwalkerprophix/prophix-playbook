<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NA Sales Director — Weekly Success Playbook</title>
<style>
  @font-face {
    font-family: 'Articulat CF';
    src: local('Articulat CF Heavy'), local('ArticulatCF-Heavy');
    font-weight: 900;
    font-style: normal;
  }
  @font-face {
    font-family: 'Articulat CF';
    src: local('Articulat CF Bold'), local('ArticulatCF-Bold');
    font-weight: 700;
    font-style: normal;
  }
  @font-face {
    font-family: 'Articulat CF';
    src: local('Articulat CF DemiBold'), local('ArticulatCF-DemiBold');
    font-weight: 600;
    font-style: normal;
  }
  @font-face {
    font-family: 'Articulat CF';
    src: local('Articulat CF Medium'), local('ArticulatCF-Medium');
    font-weight: 500;
    font-style: normal;
  }
  @font-face {
    font-family: 'Articulat CF';
    src: local('Articulat CF Regular'), local('ArticulatCF-Regular');
    font-weight: 400;
    font-style: normal;
  }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F4F6FA;
    --surface: #FFFFFF;
    --surface2: #EEF2F8;
    --border: #D8E2EF;
    --border2: #C0CFDF;
    --text: #1A2235;
    --text2: #4A5A72;
    --text3: #8A9AB4;
    --amber: #C8860A;
    --amber-bg: #FEF3DC;
    --amber-border: #F0D080;
    --teal: #0F6E56;
    --teal-bg: #E1F5EE;
    --teal-border: #9FE1CB;
    --green: #2D7A3A;
    --green-bg: #EAF5EC;
    --red: #B83030;
    --red-bg: #FCEBEB;
    --prophix-red: #EF373E;
    --prophix-red-dark: #C82028;
    --prophix-red-light: #FDE8E9;
    --prophix-red-border: #F8B4B7;
    --prophix-blue: #448CCF;
    --prophix-blue-dark: #2A61AC;
    --prophix-blue-light: #E8F2FB;
    --prophix-blue-border: #A8CDED;
    --prophix: #EF373E;
    --prophix-dark: #2A61AC;
    --prophix-light: #E8F2FB;
    --prophix-border: #A8CDED;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Articulat CF', 'Arial', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: linear-gradient(160deg, #E8F2FB 0%, #F4F6FA 60%);
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem;
    width: 100%;
    max-width: 440px;
    text-align: center;
    box-shadow: 0 2px 32px rgba(42,97,172,0.10);
  }

  .prophix-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 auto 1.75rem;
  }

  .prophix-icon {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }

  .prophix-wordmark {
    font-size: 26px;
    font-weight: 600;
    color: var(--prophix);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .login-divider {
    width: 40px;
    height: 2px;
    background: var(--prophix-red);
    margin: 0 auto 1.5rem;
    border-radius: 2px;
    opacity: 0.4;
  }

  .login-card h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1;
    letter-spacing: -0.025em;
  }

  .login-card p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 2rem;
    line-height: 1.65;
  }

  .name-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .name-btn {
    padding: 14px 10px;
    border: 1.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    font-family: 'Articulat CF', 'Arial', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }

  .name-btn:hover { background: var(--prophix-blue-light); border-color: var(--prophix-blue); color: var(--prophix-blue-dark); }
  .name-btn.selected { background: var(--prophix-red); color: white; border-color: var(--prophix-red); }

  .name-btn .role {
    display: block;
    font-size: 11px;
    font-weight: 400;
    opacity: 0.6;
    margin-top: 3px;
  }

  .name-btn.selected .role { opacity: 0.75; }

  .enter-btn {
    width: 100%;
    padding: 14px;
    background: var(--prophix-blue-dark);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Articulat CF', 'Arial', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s;
  }

  .enter-btn:hover { background: var(--prophix-blue); }
  .enter-btn:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

  .login-footer {
    margin-top: 1.5rem;
    font-size: 11px;
    color: var(--text3);
  }

  #app { display: none; }

  .top-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .top-bar-left { display: flex; align-items: center; gap: 12px; }

  .top-prophix-logo { display: flex; align-items: center; gap: 7px; text-decoration: none; }

  .top-prophix-icon { width: 28px; height: 28px; }

  .top-prophix-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--prophix-red);
    letter-spacing: -0.01em;
  }

  .top-divider {
    width: 1px;
    height: 18px;
    background: var(--border2);
  }

  .top-title {
    font-size: 13px;
    color: var(--text2);
    font-weight: 400;
  }

  .top-right { display: flex; align-items: center; gap: 12px; }

  .week-badge {
    font-size: 12px;
    color: var(--text2);
    font-family: 'Articulat CF', 'Courier New', monospace;
  }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 10px 5px 6px;
    background: var(--prophix-blue-light);
    border: 1px solid var(--prophix-blue-border);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--prophix-blue-dark);
  }

  .avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--prophix-blue-dark);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .switch-btn {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Articulat CF', 'Arial', sans-serif;
    text-decoration: underline;
    padding: 0;
  }

  .switch-btn:hover { color: var(--text2); }

  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
  }

  .week-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--prophix-blue-dark);
    border-radius: var(--radius);
    padding: 12px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }

  .week-banner-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--prophix-blue-dark);
    flex-shrink: 0;
  }

  .week-banner-dates {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    font-family: 'Articulat CF', 'Courier New', monospace;
  }

  .week-banner-key {
    font-size: 11px;
    color: var(--text3);
    font-family: 'Articulat CF', 'Courier New', monospace;
    margin-left: auto;
  }

  .team-status-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .team-card .avatar-lg {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .team-card-info { flex: 1; min-width: 0; }

  .team-card-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team-card-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .team-progress-wrap { width: 48px; text-align: right; }

  .team-pct {
    font-size: 16px;
    font-weight: 600;
    font-family: 'Articulat CF', 'Courier New', monospace;
    color: var(--text);
  }

  .team-pct.complete { color: var(--green); }

  .mini-bar-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: 3px;
    overflow: hidden;
  }

  .mini-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--border2);
    transition: width 0.4s ease;
  }

  .mini-bar.complete { background: var(--green); }

  .section-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    margin-top: 1.5rem;
  }

  .section-group-header:first-child { margin-top: 0; }

  .deadline-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
  }

  .pill-friday {
    background: var(--amber-bg);
    color: var(--amber);
    border: 1px solid var(--amber-border);
  }

  .pill-tuesday {
    background: var(--teal-bg);
    color: var(--teal);
    border: 1px solid var(--teal-border);
  }

  .deadline-label { font-size: 12px; color: var(--text3); }

  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 10px;
  }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-head-labels { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .source-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 5px;
    background: var(--prophix-red);
    color: white;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .source-sub-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 5px;
    background: var(--prophix-blue-light);
    color: var(--prophix-blue-dark);
    border: 1px solid var(--prophix-blue-border);
    white-space: nowrap;
  }

  .section-count { font-size: 12px; color: var(--text3); font-family: 'Articulat CF', 'Courier New', monospace; }

  .progress-strip { height: 2px; background: var(--surface2); }

  .progress-fill { height: 2px; transition: width 0.35s ease; }

  .fill-amber { background: #C8860A; }
  .fill-teal { background: #1D9E75; }
  .fill-green { background: #2D7A3A; }

  .subsection-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 10px 16px 4px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }

  .check-row {
    border-top: 1px solid var(--border);
    padding: 11px 16px;
    transition: background 0.1s;
  }

  .check-row-top {
    display: flex;
    align-items: flex-start;
    gap: 11px;
    cursor: pointer;
    user-select: none;
  }

  .check-row:hover { background: #FAFAF8; }

  .cb {
    width: 17px;
    height: 17px;
    min-width: 17px;
    border: 1.5px solid var(--border2);
    border-radius: 4px;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--surface);
    flex-shrink: 0;
  }

  .cb.checked { background: var(--green); border-color: var(--green); }

  .cb.checked::after {
    content: '';
    display: block;
    width: 9px;
    height: 5px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }

  .check-text { flex: 1; }

  .check-label { font-size: 13px; color: var(--text); line-height: 1.5; transition: color 0.15s; }
  .check-label.done { color: var(--text3); text-decoration: line-through; text-decoration-color: var(--border2); }

  .check-note { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.5; }

  .check-owner { font-size: 10px; font-family: 'Articulat CF', 'Courier New', monospace; color: var(--text3); margin-top: 2px; display: block; }
  .check-owner.by-me { color: var(--green); }

  .check-timestamp {
    display: inline-block;
    font-size: 10px;
    font-family: 'Articulat CF', 'Courier New', monospace;
    color: var(--prophix-blue-dark);
    background: var(--prophix-blue-light);
    border: 1px solid var(--prophix-blue-border);
    border-radius: 4px;
    padding: 2px 6px;
    margin-top: 3px;
  }

  .comment-area {
    margin-top: 8px;
    padding-left: 28px;
  }

  .comment-input {
    width: 100%;
    font-family: 'Articulat CF', 'Arial', sans-serif;
    font-size: 12px;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    resize: vertical;
    min-height: 36px;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }

  .comment-input::placeholder { color: var(--text3); }
  .comment-input:focus { border-color: var(--prophix-blue); background: white; }

  .comment-other {
    margin-top: 4px;
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
    padding-left: 28px;
  }

  .sync-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 0;
  }

  .sync-status {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border2);
    transition: background 0.3s;
  }

  .sync-dot.syncing { background: var(--amber); }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.error { background: var(--red); }

  .refresh-btn {
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Articulat CF', 'Arial', sans-serif;
    padding: 0;
  }

  .refresh-btn:hover { color: var(--text2); }

  .loading-overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    font-size: 13px;
    color: var(--text3);
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .loading-overlay span { animation: pulse 1.4s ease-in-out infinite; }
</style>
</head>

let currentUser = null;
let remoteData = [];
let commentTimers = {};

function getESTOffset(d) {
  const year = d.getUTCFullYear();
  const march = new Date(Date.UTC(year, 2, 1));
  const marchDay = march.getUTCDay();
  const dstStart = new Date(Date.UTC(year, 2, (7 - marchDay) % 7 + 8, 7));
  const nov = new Date(Date.UTC(year, 10, 1));
  const novDay = nov.getUTCDay();
  const dstEnd = new Date(Date.UTC(year, 10, (7 - novDay) % 7 + 1, 6));
  return (d >= dstStart && d < dstEnd) ? -4 : -5;
}

function getWeekStart(now) {
  const offsetHours = getESTOffset(now);
  const estMs = now.getTime() + offsetHours * 3600000;
  const estNow = new Date(estMs);
  const dow = estNow.getUTCDay();
  const daysSinceMon = (dow === 0) ? 6 : dow - 1;
  const estMonday = new Date(estMs);
  estMonday.setUTCDate(estNow.getUTCDate() - daysSinceMon);
  estMonday.setUTCHours(12, 0, 0, 0);
  if (estMs < estMonday.getTime()) {
    estMonday.setUTCDate(estMonday.getUTCDate() - 7);
  }
  return estMonday;
}

function getWeekKey() {
  const ws = getWeekStart(new Date());
  const y = ws.getUTCFullYear();
  const m = String(ws.getUTCMonth() + 1).padStart(2, '0');
  const d = String(ws.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function fmtLong(utcMs) {
  const d = new Date(utcMs);
  const off = getESTOffset(d);
  const local = new Date(utcMs + off * 3600000);
  return local.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

function fmtShort(utcMs) {
  return new Date(utcMs).toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
}

function getWeekLabel() {
  const ws = getWeekStart(new Date());
  const we = new Date(ws.getTime() + 7 * 24 * 3600000);
  return fmtLong(ws.getTime()) + ' (noon EST) – ' + fmtLong(we.getTime()) + ' (11:59am EST)';
}

function getWeekShortLabel() {
  const ws = getWeekStart(new Date());
  const we = new Date(ws.getTime() + 7 * 24 * 3600000 - 60000);
  return 'Week of ' + fmtShort(ws.getTime()) + ' – ' + fmtShort(we.getTime());
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function selectName(btn) {
  document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const eb = document.getElementById('enter-btn');
  eb.disabled = false;
  eb.textContent = 'Enter as ' + btn.dataset.name;
}

function enterApp() {
  const sel = document.querySelector('.name-btn.selected');
  if (!sel) return;
  currentUser = sel.dataset.name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('top-week').textContent = getWeekShortLabel();
  document.getElementById('top-week').title = getWeekLabel();
  document.getElementById('top-name').textContent = currentUser;
  document.getElementById('top-avatar').textContent = initials(currentUser);
  loadData();
  setInterval(loadData, 30000);
}

function switchUser() {
  currentUser = null;
  remoteData = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
  const eb = document.getElementById('enter-btn');
  eb.disabled = true;
  eb.textContent = 'Select your name to continue';
}

function setSyncState(state, msg) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = msg;
}

async function loadData() {
  setSyncState('syncing', 'Syncing...');
  try {
    const res = await fetch(API + '?v=' + Date.now());
    const json = await res.json();
    remoteData = json;
    setSyncState('synced', 'Synced ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
    renderAll();
  } catch(e) {
    setSyncState('error', 'Sync failed — check connection');
    renderAll();
  }
}

function getRow(itemId, director) {
  const week = getWeekKey();
  return remoteData.find(r => r.item_id === itemId && r.director === director && r.week === week) || null;
}

function isChecked(itemId, director) {
  const row = getRow(itemId, director);
  return row ? (row.checked === true || row.checked === 'TRUE') : false;
}

function getComment(itemId, director) {
  const row = getRow(itemId, director);
  return row ? (row.comment || '') : '';
}

function getTimestamp(itemId, director) {
  const row = getRow(itemId, director);
  return row ? (row.timestamp || '') : '';
}

function formatTimestamp() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
  const date = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  return `Completed at ${time} on ${date}`;
}

async function toggleItem(itemId) {
  const week = getWeekKey();
  const current = isChecked(itemId, currentUser);
  const newVal = !current;
  const comment = getComment(itemId, currentUser);
  const timestamp = newVal ? formatTimestamp() : '';

  const idx = remoteData.findIndex(r => r.item_id === itemId && r.director === currentUser && r.week === week);
  if (idx >= 0) {
    remoteData[idx].checked = newVal;
    remoteData[idx].timestamp = timestamp;
  } else {
    remoteData.push({ item_id: itemId, director: currentUser, checked: newVal, week, comment, timestamp });
  }
  renderAll();

  setSyncState('syncing', 'Saving...');
  try {
    await fetch(API, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item_id: itemId, director: currentUser, checked: newVal, week, comment, timestamp })
    });
    setSyncState('synced', 'Saved ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
  } catch(e) {
    setSyncState('error', 'Save failed');
  }
}

function onCommentInput(itemId, value) {
  const week = getWeekKey();
  const idx = remoteData.findIndex(r => r.item_id === itemId && r.director === currentUser && r.week === week);
  if (idx >= 0) {
    remoteData[idx].comment = value;
  } else {
    remoteData.push({ item_id: itemId, director: currentUser, checked: false, week, comment: value });
  }

  clearTimeout(commentTimers[itemId]);
  commentTimers[itemId] = setTimeout(() => saveComment(itemId, value), 1200);
}

async function saveComment(itemId, value) {
  const week = getWeekKey();
  const checked = isChecked(itemId, currentUser);
  const timestamp = getTimestamp(itemId, currentUser);
  setSyncState('syncing', 'Saving comment...');
  try {
    await fetch(API, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item_id: itemId, director: currentUser, checked, week, comment: value, timestamp })
    });
    setSyncState('synced', 'Saved ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
  } catch(e) {
    setSyncState('error', 'Save failed');
  }
}

function getDirectorProgress(director) {
  let total = 0, done = 0;
  SECTIONS.forEach(s => s.subsections.forEach(sub => sub.items.forEach(item => {
    total++;
    if (isChecked(item.id, director)) done++;
  })));
  return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
}

function getSectionProgress(section, director) {
  let total = 0, done = 0;
  section.subsections.forEach(sub => sub.items.forEach(item => {
    total++;
    if (isChecked(item.id, director)) done++;
  }));
  return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
}

function renderTeamStatus() {
  const container = document.getElementById('team-status');
  container.innerHTML = '';
  TEAM.forEach(member => {
    const prog = getDirectorProgress(member.name);
    const complete = prog.pct === 100;
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `
      <div class="avatar-lg" style="background:${member.bg};color:${member.color}">${initials(member.name)}</div>
      <div class="team-card-info">
        <div class="team-card-name">${member.name}${member.name === currentUser ? ' (you)' : ''}</div>
        <div class="mini-bar-wrap"><div class="mini-bar ${complete ? 'complete' : ''}" style="width:${prog.pct}%"></div></div>
        <div class="team-card-sub">${prog.done} of ${prog.total} items complete</div>
      </div>
      <div class="team-progress-wrap">
        <div class="team-pct ${complete ? 'complete' : ''}">${prog.pct}%</div>
      </div>
    `;
    container.appendChild(card);
  });
}

function renderChecklist() {
  const container = document.getElementById('checklist-body');
  const savedScrolls = {};
  container.querySelectorAll('textarea[data-item-id]').forEach(ta => {
    savedScrolls[ta.dataset.itemId] = { val: ta.value, start: ta.selectionStart, end: ta.selectionEnd };
  });

  container.innerHTML = '';
  let lastDeadline = null;

  SECTIONS.forEach(section => {
    if (section.deadline !== lastDeadline) {
      const groupHead = document.createElement('div');
      groupHead.className = 'section-group-header';
      groupHead.innerHTML = `
        <span class="deadline-pill ${section.deadlineClass}">Due ${section.deadline}</span>
        <span class="deadline-label">You review ${section.deadline === 'Friday EOD' ? 'Monday morning' : 'Wednesday morning'}</span>
      `;
      container.appendChild(groupHead);
      lastDeadline = section.deadline;
    }

    const myProg = getSectionProgress(section, currentUser);
    const allDone = myProg.pct === 100;
    const fillClass = allDone ? 'fill-green' : section.fillClass;
    const card = document.createElement('div');
    card.className = 'section-card';

    let subsHtml = '';
    section.subsections.forEach(sub => {
      if (sub.label) {
        subsHtml += `<div class="subsection-label">${sub.label}</div>`;
      }
      sub.items.forEach(item => {
        const myChecked = isChecked(item.id, currentUser);
        const myComment = getComment(item.id, currentUser);
        const myTimestamp = getTimestamp(item.id, currentUser);

        const otherChecks = TEAM.filter(m => m.name !== currentUser).map(m => {
          return isChecked(item.id, m.name) ? `<span style="color:${m.color};font-weight:500">${m.name}</span>` : null;
        }).filter(Boolean);

        const otherComments = TEAM.filter(m => m.name !== currentUser).map(m => {
          const c = getComment(item.id, m.name);
          return c ? `<div class="comment-other"><strong style="color:${m.color}">${m.name}:</strong> ${c.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : null;
        }).filter(Boolean);

        let ownerHtml = '';
        if (myChecked && myTimestamp) ownerHtml += `<span class="check-timestamp">${myTimestamp}</span>`;
        if (otherChecks.length) ownerHtml += `<span class="check-owner">Also done: ${otherChecks.join(', ')}</span>`;

        subsHtml += `
          <div class="check-row">
            <div class="check-row-top" onclick="toggleItem('${item.id}')">
              <div class="cb ${myChecked ? 'checked' : ''}"></div>
              <div class="check-text">
                <div class="check-label ${myChecked ? 'done' : ''}">${item.label}</div>
                <div class="check-note">${item.note}</div>
                ${ownerHtml}
              </div>
            </div>
            <div class="comment-area">
              <textarea
                class="comment-input"
                data-item-id="${item.id}"
                placeholder="Sales Director comments (optional)"
                oninput="onCommentInput('${item.id}', this.value)"
                onclick="event.stopPropagation()"
              >${myComment}</textarea>
            </div>
            ${otherComments.join('')}
          </div>`;
      });
    });

    card.innerHTML = `
      <div class="section-head">
        <div class="section-head-labels">
          <span class="source-tag">${section.source}</span>
          <span class="source-sub-tag">${section.sourceLabel}</span>
        </div>
        <span class="section-count">${myProg.done}/${myProg.total}</span>
      </div>
      <div class="progress-strip"><div class="progress-fill ${fillClass}" style="width:${myProg.pct}%"></div></div>
      ${subsHtml}
    `;
    container.appendChild(card);
  });
}

function renderAll() {
  const banner = document.getElementById('week-banner');
  if (banner) {
    banner.innerHTML = `
      <span class="week-banner-label">Current week</span>
      <span class="week-banner-dates">${getWeekLabel()}</span>
      <span class="week-banner-key">ID: ${getWeekKey()}</span>
    `;
  }
  renderTeamStatus();
  renderChecklist();
}
</script>
</body>
</html>
